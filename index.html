        async function loadWeekSettings() {

                await db.collection('settings').doc('weekLocks').set({

        // Save a sentence score to Firestore
        async function saveScoreToFirestore(userId, className, studentName, weekId, sentenceIdx, scoreData) {
            try {
                const docId = `${userId}_week${weekId}_s${sentenceIdx}`;
                await db.collection('scores').doc(docId).set({
                    userId,
                    className,
                    studentName,
                    weekId,
                    sentenceIdx,
                    ...scoreData,
                    sentenceText: scoreData.sentence?.text || '',
                    sentenceVocab: scoreData.sentence?.vocab || '',
                    sentenceTip: scoreData.sentence?.tip || '',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
            } catch (err) {
                console.error('Failed to save score:', err);
            }
        }

        // Load all scores for a student
        async function loadStudentScores(userId) {
            try {
                const snapshot = await db.collection('scores').where('userId', '==', userId).get();
                const weeklyScores = {};
                snapshot.forEach(doc => {
                    const d = doc.data();
                    const wId = Number(d.weekId);
                    if (!weeklyScores[wId]) weeklyScores[wId] = {};
                    weeklyScores[wId][d.sentenceIdx] = {
                        accuracy: d.accuracy || 0,
                        fluency: d.fluency || 0,
                        prosody: d.prosody || 0,
                        pronunciation: d.pronunciation || 0,
                        completeness: d.completeness || 0,
                        content: d.content || 0,
                        recognizedText: d.recognizedText || '',
                        words: d.words || [],
                        sentence: { text: d.sentenceText, vocab: d.sentenceVocab, tip: d.sentenceTip }
                    };
                });
                return weeklyScores;
            } catch (err) {
                console.error('Failed to load scores:', err);
                return {};
            }
        }

        function calculateTotalScore(accuracy, completeness, prosody, lateDay = 0) {
            const total = accuracy * 0.3 + completeness * 0.3 + prosody * 0.4;
            const penalty = Math.min(total, lateDay * 5);
            return Math.max(0, Math.round(total - penalty));
        }

        async function assessPronunciation(audioBlob, referenceText) {
            const SpeechSDK = window.SpeechSDK;
            if (!SpeechSDK) {
                console.error('Speech SDK not loaded');
                return null;
            }

            try {
                const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(AZURE_SPEECH_KEY, AZURE_SPEECH_REGION);
                speechConfig.speechRecognitionLanguage = 'en-US';

                const pronunciationConfig = new SpeechSDK.PronunciationAssessmentConfig(
                    referenceText,
                    SpeechSDK.PronunciationAssessmentGradingSystem.HundredMark,
                    SpeechSDK.PronunciationAssessmentGranularity.Phoneme,
                    true
                );
                pronunciationConfig.enableProsodyAssessment = true;
                pronunciationConfig.enableContentAssessment = true;

                // Convert webm blob to wav for Azure Speech SDK
                const arrayBuffer = await audioBlob.arrayBuffer();
                const audioFormat = SpeechSDK.AudioStreamFormat.getWaveFormatPCM(16000, 16, 1);

                // Use pushStream for raw audio
                const pushStream = SpeechSDK.AudioInputStream.createPushStream(audioFormat);

                // We need to convert the webm to PCM - use AudioContext
                const audioContext = new AudioContext({ sampleRate: 16000 });
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                const channelData = audioBuffer.getChannelData(0);

                // Convert float32 to int16 PCM
                const pcmData = new Int16Array(channelData.length);
                for (let i = 0; i < channelData.length; i++) {
                    const s = Math.max(-1, Math.min(1, channelData[i]));
                    pcmData[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                }
                pushStream.write(pcmData.buffer);
                pushStream.close();

                const audioConfig = SpeechSDK.AudioConfig.fromStreamInput(pushStream);
                const recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);
                pronunciationConfig.applyTo(recognizer);

                return new Promise((resolve, reject) => {
                    recognizer.recognizeOnceAsync(
                        (result) => {
                            recognizer.close();
                            audioContext.close();
                            if (result.reason === SpeechSDK.ResultReason.RecognizedSpeech) {
                                const pronResult = SpeechSDK.PronunciationAssessmentResult.fromResult(result);

                                // Extract word-level details
                                let words = [];
                                try {
                                    const jsonStr = result.properties.getProperty(SpeechSDK.PropertyId.SpeechServiceResponse_JsonResult);
                                    const jsonResult = JSON.parse(jsonStr);
                                    const nBest = jsonResult?.NBest?.[0];
                                    if (nBest && nBest.Words) {
                                        words = nBest.Words.map(w => ({
                                            word: w.Word,
                                            accuracyScore: Math.round(w.PronunciationAssessment?.AccuracyScore || 0),
                                            errorType: w.PronunciationAssessment?.ErrorType || 'None',
                                            phonemes: (w.Phonemes || []).map(p => ({
                                                phoneme: p.Phoneme,
                                                score: Math.round(p.PronunciationAssessment?.AccuracyScore || 0)
                                            }))
                                        }));
                                    }
                                } catch (e) {
                                    console.warn('Could not parse word details:', e);
                                }

                                resolve({
                                    content: Math.round(pronResult.contentAssessmentResult?.pronunciationScore || pronResult.accuracyScore || 0),
                                    pronunciation: Math.round(pronResult.pronunciationScore || 0),
                                    prosody: Math.round(pronResult.prosodyScore || 0),
                                    accuracy: Math.round(pronResult.accuracyScore || 0),
                                    fluency: Math.round(pronResult.fluencyScore || 0),
                                    completeness: Math.round(pronResult.completenessScore || 0),
                                    recognizedText: result.text,
                                    words: words
                                });
                            } else if (result.reason === SpeechSDK.ResultReason.NoMatch) {
                                resolve({ content: 0, pronunciation: 0, prosody: 0, accuracy: 0, fluency: 0, completeness: 0, recognizedText: '(未辨識到語音)' });
                            } else {
                                reject(new Error('Speech recognition failed: ' + result.errorDetails));
                            }
                        },
                        (err) => {
                            recognizer.close();
                            audioContext.close();
                            reject(err);
                        }
                    );
                });
            } catch (error) {
                console.error('Pronunciation assessment error:', error);
                return null;
            }
        }

                            style={{borderRadius: '8px'}}
                        />
                        <div className="flex gap-2 mt-3 items-center">
                            <span className="text-sm text-gray-600">播放速度：</span>
                            {[0.75, 1, 1.25].map(speed => (
                                <button
                                    key={speed}
                                    onClick={(e) => {
                                        const audio = e.target.closest('.space-y-6').querySelector('audio');
                                        if (audio) audio.playbackRate = speed;
                                        setPlayingSpeed(speed + 'x');
                                    }}
                                    className={`px-3 py-1 text-sm border rounded-lg font-medium transition ${
                                        playingSpeed === speed + 'x'
                                            ? 'bg-blue-600 text-white border-blue-600'
                                            : 'border-blue-300 text-blue-600 hover:bg-blue-50'
                                    }`}
                                >
                                    {speed}x
                                </button>
                            ))}
                        </div>
                        <p className="text-xs text-gray-500 mt-2">NotebookLM 生成的完整 Podcast，邊聽邊看下方對話內容</p>
                    </div>

                    <div className="bg-white rounded-lg p-6 shadow-sm border border-gray-100">
                        <h3 className="font-bold text-gray-900 mb-4">對話內容</h3>
                        <p className="text-xs text-gray-500 mb-3">🔵 藍色標示 = 本週目標語塊</p>
                        <div className="text-gray-700 leading-relaxed">
                            {dialogueParts.map(part =>
                                part.type === 'br' ? <br key={part.key} /> :
                                part.type === 'vocab' ? (
                                    <span key={part.key} className="text-blue-600 font-semibold bg-blue-50 px-0.5 rounded">{part.content}</span>
                                ) : (
                                    <span key={part.key}>{part.content}</span>
                                )
                            )}
                        </div>
                    </div>

                    <div className="bg-white rounded-lg p-6 shadow-sm border border-gray-100">
                        <h3 className="font-bold text-gray-900 mb-4">字彙表</h3>
                        <div className="space-y-4">
                            {VOCABULARY.map(vocab => (
                                <div key={vocab.id} className="border-b border-gray-200 pb-4 last:border-0">
                                    <div className="font-semibold text-gray-900">{vocab.phrase}</div>
                                    <div className="text-sm text-gray-600 italic">{vocab.ipa}</div>
                                    <div className="text-sm text-blue-600 font-medium">{vocab.zh}</div>
                                    <div className="text-sm text-gray-700 mt-1">💬 {vocab.example}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="bg-white rounded-lg p-6 shadow-sm border border-gray-100">
                        <h3 className="font-bold text-gray-900 mb-4">理解力檢測</h3>
                        <div className="space-y-6">
                            {COMPREHENSION_QUESTIONS.map((q) => {
                                const selected = selectedAnswers[q.id];
                                const isCorrect = selected !== undefined && q.options[selected]?.correct;
                                return (
                                    <div key={q.id} className="border-b border-gray-200 pb-4 last:border-0">
                                        <p className="font-medium text-gray-900 mb-3">{q.id}. {q.question}</p>
                                        <div className="space-y-2">
                                            {q.options.map((opt, idx) => {
                                                let borderColor = 'border-gray-200';
                                                let bgColor = 'hover:bg-blue-50';
                                                if (submitted) {
                                                    if (opt.correct) {
                                                        borderColor = 'border-green-500';
                                                        bgColor = 'bg-green-50';
                                                    } else if (selected === idx && !opt.correct) {
                                                        borderColor = 'border-red-400';
                                                        bgColor = 'bg-red-50';
                                                    } else {
                                                        bgColor = '';
                                                    }
                                                } else if (selected === idx) {
                                                    borderColor = 'border-blue-400';
                                                    bgColor = 'bg-blue-50';
                                                }
                                                return (
                                                    <label key={idx} className={`flex items-center p-3 border ${borderColor} rounded-lg ${bgColor} ${submitted ? '' : 'cursor-pointer'}`}>
                                                        <input
                                                            type="radio"
                                                            name={`q${q.id}`}
                                                            disabled={submitted}
                                                            checked={selected === idx}
                                                            onChange={() => {
                                                                setSelectedAnswers(prev => ({
                                                                    ...prev,
                                                                    [q.id]: idx
                                                                }));
                                                            }}
                                                            className="mr-3"
                                                        />
                                                        <span className="text-gray-700">{opt.text}</span>
                                                        {submitted && opt.correct && <span className="ml-auto text-green-600 font-bold">&#10004;</span>}
                                                        {submitted && selected === idx && !opt.correct && <span className="ml-auto text-red-500 font-bold">&#10008;</span>}
                                                    </label>
                                                );
                                            })}
                                        </div>
                                        {submitted && (
                                            <div className={`mt-3 p-3 rounded-lg text-sm ${isCorrect ? 'bg-green-50 border border-green-200' : 'bg-amber-50 border border-amber-200'}`}>
                                                <p className="font-semibold mb-1">{isCorrect ? '✅ 答對了！' : '❌ 答錯了，正確答案是：' + q.options[q.correctIndex].text}</p>
                                                <p className="text-gray-700">{q.explanation}</p>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                        {!submitted && (
                            <button
                                onClick={() => setSubmitted(true)}
                                disabled={!allSelected}
                                className={`mt-6 w-full py-3 rounded-lg font-semibold transition ${allSelected ? 'bg-blue-600 text-white hover:bg-blue-700' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}
                            >
                                送出答案
                            </button>
                        )}
                        {submitted && (
                            <div className="mt-4 space-y-3">
                                <div className={`p-4 rounded-lg font-medium text-center ${
                                    Object.keys(selectedAnswers).every(qId => {
                                        const q = COMPREHENSION_QUESTIONS.find(c => c.id === parseInt(qId));
                                        return q && q.options[selectedAnswers[qId]]?.correct;
                                    }) ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-amber-50 text-amber-700 border border-amber-200'
                                }`}>
                                    {(() => {
                                        const correctCount = Object.keys(selectedAnswers).filter(qId => {
                                            const q = COMPREHENSION_QUESTIONS.find(c => c.id === parseInt(qId));
                                            return q && q.options[selectedAnswers[qId]]?.correct;
                                        }).length;
                                        return `你答對了 ${correctCount}/${COMPREHENSION_QUESTIONS.length} 題`;
                                    })()}
                                </div>
                                <button
                                    onClick={() => { setSubmitted(false); setSelectedAnswers({}); }}
                                    className="w-full py-2 rounded-lg font-semibold bg-gray-100 text-gray-700 hover:bg-gray-200 transition"
                                >
                                    重新作答
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ElevenLabs audio data (base64-encoded mp3) — loaded below
        // Audio file paths — mp3 files in audio/W{weekId}/W{weekId}_S{num}.mp3
        function getSentenceAudioSrc(weekId, sentenceNum) {
            return `W${weekId}/W${weekId}_S${sentenceNum}.mp3`;
        }


        // Curated key sentences for shadowing practice - matched to podcast dialogue
        function PracticeTab({ weeklyScores = {}, setWeeklyScores, user = {}, weekId = 1 }) {
            const keySentences = getCourseContent(weekId).keySentences;
            const [currentIdx, setCurrentIdx] = useState(0);
            // phases: ready -> listening -> recording -> recorded -> submitted
            const [phase, setPhase] = useState('ready');
            const [isPlaying, setIsPlaying] = useState(false);
            const [recordingScore, setRecordingScore] = useState(null);
            const [completedSentences, setCompletedSentences] = useState([]);
            const [audioURLs, setAudioURLs] = useState({});
            const [audioBlobs, setAudioBlobs] = useState({});
            const [recordingTime, setRecordingTime] = useState(0);
            const [isScoring, setIsScoring] = useState(false);
            const [sentenceScores, setSentenceScores] = useState({});

            // Reset state when switching weeks
            useEffect(() => {
                setCurrentIdx(0);
                setPhase('ready');
                setRecordingScore(null);
                setCompletedSentences([]);
                setAudioURLs({});
                setAudioBlobs({});
                setSentenceScores({});
                setRecordingTime(0);
            }, [weekId]);

            const mediaRecorderRef = React.useRef(null);
            const audioChunksRef = React.useRef([]);
            const timerRef = React.useRef(null);
            const streamRef = React.useRef(null);

            const currentSentence = keySentences[currentIdx];
            const totalSentences = keySentences.length;
            const progress = Math.round((completedSentences.length / totalSentences) * 100);

            const [micReady, setMicReady] = useState(false);

            // Request microphone ONCE on mount, keep stream alive
            useEffect(() => {
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => {
                        streamRef.current = stream;
                        setMicReady(true);
                    })
                    .catch(() => {
                        alert('無法存取麥克風，請在瀏覽器設定中允許麥克風權限。');
                    });
                return () => {
                    if (timerRef.current) clearInterval(timerRef.current);
                    if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
                };
            }, []);

            const audioPlayerRef = React.useRef(null);

            const playSentence = () => {
                setPhase('listening');
                setIsPlaying(true);

                const audioSrc = getSentenceAudioSrc(weekId, currentIdx + 1);
                const audio = new Audio(audioSrc);
                audioPlayerRef.current = audio;
                audio.onended = () => { setIsPlaying(false); setPhase('canRecord'); };
                audio.onerror = () => {
                    // Fallback to browser TTS if mp3 not found
                    const u = new SpeechSynthesisUtterance(currentSentence.text);
                    u.lang = 'en-US'; u.rate = 0.85;
                    u.onend = () => { setIsPlaying(false); setPhase('canRecord'); };
                    u.onerror = () => { setIsPlaying(false); setPhase('canRecord'); };
                    window.speechSynthesis.speak(u);
                };
                audio.play().catch(() => {
                    const u = new SpeechSynthesisUtterance(currentSentence.text);
                    u.lang = 'en-US'; u.rate = 0.85;
                    u.onend = () => { setIsPlaying(false); setPhase('canRecord'); };
                    u.onerror = () => { setIsPlaying(false); setPhase('canRecord'); };
                    window.speechSynthesis.speak(u);
                });
            };

            const startRecording = async () => {
                try {
                    // Reuse existing stream, or request new one if lost
                    let stream = streamRef.current;
                    if (!stream || stream.getTracks().every(t => t.readyState === 'ended')) {
                        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        streamRef.current = stream;
                        setMicReady(true);
                    }

                    audioChunksRef.current = [];
                    const mediaRecorder = new MediaRecorder(stream);
                    mediaRecorderRef.current = mediaRecorder;

                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) audioChunksRef.current.push(e.data);
                    };

                    mediaRecorder.onstop = () => {
                        const blob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
                        const url = URL.createObjectURL(blob);
                        setAudioURLs(prev => ({ ...prev, [currentIdx]: url }));
                        setAudioBlobs(prev => ({ ...prev, [currentIdx]: blob }));
                        // Do NOT stop the stream — keep it alive for next recording
                        if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
                        setPhase('recorded');
                    };

                    mediaRecorder.start();
                    setPhase('recording');
                    setRecordingTime(0);
                    timerRef.current = setInterval(() => {
                        setRecordingTime(prev => prev + 1);
                    }, 1000);
                } catch (err) {
                    alert('無法存取麥克風，請確認瀏覽器已允許麥克風權限。');
                }
            };

            const stopRecording = () => {
                if (mediaRecorderRef.current && mediaRecorderRef.current.state === 'recording') {
                    mediaRecorderRef.current.stop();
                }
            };

            const handleSubmitSentence = async () => {
                setIsScoring(true);
                setPhase('submitted');

                const blob = audioBlobs[currentIdx];
                if (blob && currentSentence) {
                    try {
                        const result = await assessPronunciation(blob, currentSentence.text);
                        if (result) {
                            setSentenceScores(prev => ({ ...prev, [currentIdx]: result }));
                            // Save to shared weekly scores (local)
                            const scoreWithSentence = { ...result, sentence: currentSentence };
                            if (setWeeklyScores) {
                                setWeeklyScores(prev => ({
                                    ...prev,
                                    [weekId]: { ...(prev[weekId] || {}), [currentIdx]: scoreWithSentence }
                                }));
                            }
                            // Save to Firestore (cloud)
                            if (user.uid) {
                                saveScoreToFirestore(user.uid, user.class, user.studentName, weekId, currentIdx, scoreWithSentence);
                            }
                        }
                    } catch (err) {
                        console.error('Scoring error:', err);
                    }
                }

                if (!completedSentences.includes(currentIdx)) {
                    setCompletedSentences(prev => [...prev, currentIdx]);
                }
                setIsScoring(false);
            };

            const goNext = () => {
                if (currentIdx < totalSentences - 1) {
                    setCurrentIdx(currentIdx + 1);
                    setPhase('ready');
                    setRecordingTime(0);
                }
            };

            const handleSubmitAll = () => {
                const scoreValues = Object.values(sentenceScores);
                if (scoreValues.length === 0) {
                    // Fallback if no individual scores
                    const fallback = { completeness: 0, pronunciation: 0, prosody: 0, total: 0 };
                    setRecordingScore(fallback);
                    return;
                }
                const avg = (key) => Math.round(scoreValues.reduce((sum, s) => sum + (s[key] || 0), 0) / scoreValues.length);
                const aggregated = {
                    completeness: avg('completeness'),
                    pronunciation: avg('pronunciation'),
                    prosody: avg('prosody'),
                    accuracy: avg('accuracy'),
                    fluency: avg('fluency'),
                };
                const total = calculateTotalScore(aggregated.accuracy, aggregated.completeness, aggregated.prosody);
                setRecordingScore({ ...aggregated, total });
            };

            const formatTime = (s) => {
                const m = Math.floor(s / 60);
                const sec = s % 60;
                return m + ':' + (sec < 10 ? '0' : '') + sec;
            };

            if (!currentSentence) return <div className="text-gray-500 p-6">本週跟讀內容尚未準備好</div>;

            return (
                <div className="space-y-6">
                    {/* Header + Progress */}
                    <div className="bg-white rounded-lg p-6 shadow-sm border border-gray-100">
                        <h3 className="font-bold text-gray-900 mb-1">精選重點句跟讀</h3>
                        <p className="text-sm text-gray-500 mb-3">從對話中精選 {totalSentences} 句含關鍵片語或語調重點的句子，每句都有練習提示</p>
                        <div className="flex justify-between items-center mb-2">
                            <span className="text-sm text-gray-600">
                                已完成 {completedSentences.length} / {totalSentences} 句
                            </span>
                            <span className="text-xs text-gray-400">全部完成即可提交作業</span>
                        </div>
                        <div className="w-full bg-gray-200 rounded-full h-2">
                            <div className="bg-blue-600 h-2 rounded-full transition-all" style={{ width: progress + '%' }}></div>
                        </div>
                    </div>

                    {/* Sentence list overview */}
                    <div className="bg-white rounded-lg p-4 shadow-sm border border-gray-100">
                        <div className="flex flex-wrap gap-2">
                            {keySentences.map((s, idx) => (
                                <button
                                    key={idx}
                                    onClick={() => { setCurrentIdx(idx); setPhase(completedSentences.includes(idx) ? 'submitted' : 'ready'); setRecordingTime(0); }}
                                    className={`px-3 py-1.5 rounded-lg text-xs font-medium border transition ${
                                        idx === currentIdx
                                            ? 'bg-blue-600 text-white border-blue-600'
                                            : completedSentences.includes(idx)
                                                ? 'bg-green-50 text-green-700 border-green-300'
                                                : 'bg-gray-50 text-gray-600 border-gray-200 hover:border-blue-300'
                                    }`}
                                >
                                    {completedSentences.includes(idx) ? '✓ ' : ''}第 {idx + 1} 句
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Current sentence card */}
                    <div className="bg-white rounded-lg p-6 shadow-sm border border-gray-100">
                        {/* Tags */}
                        <div className="flex items-center gap-2 mb-3 flex-wrap">
                            <span className="text-sm font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full">
                                第 {currentIdx + 1} / {totalSentences} 句
                            </span>
                            <span className={`text-xs px-2 py-1 rounded-full font-medium ${
                                currentSentence.speaker === 'Alex'
                                    ? 'bg-green-100 text-green-700'
                                    : 'bg-purple-100 text-purple-700'
                            }`}>
                                {currentSentence.speaker}
                            </span>
                            <span className="text-xs px-2 py-1 rounded-full bg-amber-100 text-amber-700 font-medium">
                                {currentSentence.tag}
                            </span>
                        </div>

                        {/* Sentence display */}
                        <div className={`p-5 rounded-lg mb-4 ${
                            phase === 'listening' ? 'bg-blue-50 border-2 border-blue-400' :
                            phase === 'canRecord' ? 'bg-amber-50 border-2 border-amber-400' :
                            phase === 'recording' ? 'bg-red-50 border-2 border-red-400' :
                            phase === 'recorded' ? 'bg-orange-50 border-2 border-orange-400' :
                            phase === 'submitted' ? 'bg-green-50 border-2 border-green-400' :
                            'bg-gray-50 border-2 border-gray-200'
                        }`}>
                            <p className="text-lg font-medium text-gray-900 leading-relaxed">{currentSentence.text}</p>
                            {currentSentence.vocab && (
                                <p className="text-sm text-blue-600 font-semibold mt-2">目標語塊：{currentSentence.vocab}</p>
                            )}
                            <p className={`text-sm mt-2 font-semibold ${
                                phase === 'listening' ? 'text-blue-600' :
                                phase === 'canRecord' ? 'text-amber-600' :
                                phase === 'recording' ? 'text-red-600' :
                                phase === 'recorded' ? 'text-orange-600' :
                                phase === 'submitted' ? 'text-green-600' :
                                'text-gray-500'
                            }`}>
                                {phase === 'ready' && '⏸ 準備好了就按「播放」聆聽示範'}
                                {phase === 'listening' && '🔊 仔細聽...注意語調和發音'}
                                {phase === 'canRecord' && '🎤 聽完了！按下「開始錄音」錄下你的跟讀'}
                                {phase === 'recording' && '⏺ 錄音中... ' + formatTime(recordingTime)}
                                {phase === 'recorded' && '🎧 錄音完成！可以回放試聽，滿意就按「送出」'}
                                {phase === 'submitted' && isScoring && '🔄 AI 評分中，請稍候...'}
                                {phase === 'submitted' && !isScoring && '✅ 已送出！'}
                            </p>
                        </div>

                        {/* Coaching tip */}
                        <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 mb-4">
                            <p className="text-sm text-amber-800">
                                <span className="font-bold">老師提示：</span>{currentSentence.tip}
                            </p>
                        </div>

                        {/* Playback of recording */}
                        {(phase === 'recorded' || phase === 'submitted') && audioURLs[currentIdx] && (
                            <div className="bg-gray-50 rounded-lg p-3 mb-4 flex items-center gap-3">
                                <span className="text-sm text-gray-600 font-medium">你的錄音：</span>
                                <audio controls src={audioURLs[currentIdx]} className="flex-1 h-10" />
                            </div>
                        )}

                        {/* Per-sentence AI score */}
                        {sentenceScores[currentIdx] && phase === 'submitted' && !isScoring && (() => {
                            const sc = sentenceScores[currentIdx];
                            const weakWords = (sc.words || []).filter(w => w.accuracyScore < 60 || w.errorType !== 'None');
                            const okWords = (sc.words || []).filter(w => w.accuracyScore >= 60 && w.accuracyScore < 80 && w.errorType === 'None');
                            return (
                            <div className="bg-gradient-to-r from-blue-50 to-purple-50 border border-blue-200 rounded-lg p-4 mb-4">
                                <p className="text-sm font-bold text-gray-800 mb-3">🤖 AI 即時評分</p>
                                <div className="grid grid-cols-3 gap-3 mb-3">
                                    <div className="text-center">
                                        <p className="text-xs text-gray-500">發音準確度 (30%)</p>
                                        <p className="text-lg font-bold text-blue-600">{sc.accuracy}</p>
                                    </div>
                                    <div className="text-center">
                                        <p className="text-xs text-gray-500">完整度 (30%)</p>
                                        <p className="text-lg font-bold text-green-600">{sc.completeness}</p>
                                    </div>
                                    <div className="text-center">
                                        <p className="text-xs text-gray-500">語調韻律 (40%)</p>
                                        <p className="text-lg font-bold text-pink-600">{sc.prosody}</p>
                                    </div>
                                </div>
                                <div className="text-center mb-3">
                                    <p className="text-xs text-gray-400">流暢度（參考）：<span className="font-semibold text-purple-600">{sc.fluency}</span>/100</p>
                                </div>

                                {/* Word-by-word breakdown */}
                                {sc.words && sc.words.length > 0 && (
                                    <div className="mb-3">
                                        <p className="text-xs font-semibold text-gray-600 mb-2">逐字發音分析：</p>
                                        <div className="flex flex-wrap gap-1.5">
                                            {sc.words.map((w, wi) => {
                                                const color = w.errorType === 'Omission' ? 'bg-gray-200 text-gray-400 line-through'
                                                    : w.errorType === 'Insertion' ? 'bg-yellow-100 text-yellow-700 border border-yellow-300'
                                                    : w.accuracyScore >= 80 ? 'bg-green-100 text-green-800'
                                                    : w.accuracyScore >= 60 ? 'bg-amber-100 text-amber-800'
                                                    : 'bg-red-100 text-red-800';
                                                return (
                                                    <span key={wi} className={`inline-flex items-center gap-1 px-2 py-1 rounded text-sm font-medium ${color}`} title={`準確度: ${w.accuracyScore}/100`}>
                                                        {w.word}
                                                        <span className="text-xs opacity-70">{w.accuracyScore}</span>
                                                    </span>
                                                );
                                            })}
                                        </div>
                                        <div className="flex gap-3 mt-2 text-xs text-gray-400">
                                            <span>🟢 80+ 很好</span>
                                            <span>🟡 60-79 還行</span>
                                            <span>🔴 &lt;60 需加強</span>
                                        </div>
                                    </div>
                                )}

                                {/* Prosody detailed feedback */}
                                <div className={`rounded-lg p-3 mb-3 border ${
                                    sc.prosody >= 80 ? 'bg-green-50 border-green-200' :
                                    sc.prosody >= 60 ? 'bg-amber-50 border-amber-200' :
                                    'bg-red-50 border-red-200'
                                }`}>
                                    <p className="text-xs font-bold text-gray-700 mb-1">🎵 語調韻律回饋：</p>
                                    {sc.prosody >= 90 && (
                                        <>
                                            <p className="text-xs text-green-700 mb-1">🌟 太棒了！語調非常自然，跟母語者很接近！</p>
                                            <ul className="text-xs text-green-800 ml-3 space-y-0.5 list-disc">
                                                {currentSentence.vocab && <li>「{currentSentence.vocab}」的節奏和連音處理得很好</li>}
                                                {sc.fluency >= 85 && <li>語速流暢自然，沒有不必要的停頓</li>}
                                                {currentSentence.text.includes('?') && <li>問句的語調上揚掌握得很好 ↗</li>}
                                                {currentSentence.text.includes('!') && <li>感嘆語氣很到位，情緒表達自然</li>}
                                            </ul>
                                        </>
                                    )}
                                    {sc.prosody >= 80 && sc.prosody < 90 && (

        function generateScorePDF(studentName, className, weekId, weekTitle, weekData) {
            try {
            if (!window.jspdf) {
                alert('PDF 元件尚未載入，請稍候再試一次。');
                return;
            }
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const sentenceEntries = Object.entries(weekData).sort(([a], [b]) => Number(a) - Number(b));
            if (sentenceEntries.length === 0) {
                alert('這週還沒有成績資料，請先完成跟讀練習。');
                return;
            }
            const avg = (key) => Math.round(sentenceEntries.reduce((sum, [, s]) => sum + (s[key] || 0), 0) / sentenceEntries.length);
            const avgAccuracy = avg('accuracy');
            const avgFluency = avg('fluency');
            const avgProsody = avg('prosody');
            const avgCompleteness = avg('completeness');
            const avgPronunciation = avg('pronunciation');
            const totalScore = calculateTotalScore(avgAccuracy, avgCompleteness, avgProsody);

            // Header
            doc.setFontSize(20);
            doc.setTextColor(37, 99, 235);
            doc.text('Shadowing English', 105, 20, { align: 'center' });
            doc.setFontSize(10);
            doc.setTextColor(107, 114, 128);
            doc.text('Pronunciation Assessment Report', 105, 28, { align: 'center' });

            // Student info
            doc.setFontSize(11);
            doc.setTextColor(31, 41, 55);
            doc.text('Student: ' + studentName, 20, 42);
            doc.text('Class: ' + className, 20, 50);
            doc.text('Week ' + weekId + ': ' + weekTitle, 20, 58);
            doc.text('Date: ' + new Date().toLocaleDateString('zh-TW'), 20, 66);

            // Total score box
            doc.setFillColor(239, 246, 255);
            doc.roundedRect(20, 74, 170, 28, 3, 3, 'F');
            doc.setFontSize(14);
            doc.setTextColor(37, 99, 235);
            doc.text('Total Score: ' + totalScore + ' / 100', 105, 86, { align: 'center' });
            doc.setFontSize(9);
            doc.setTextColor(107, 114, 128);
            doc.text('Accuracy(30%): ' + avgAccuracy + '  |  Completeness(30%): ' + avgCompleteness + '  |  Prosody(40%): ' + avgProsody + '  |  Fluency(ref): ' + avgFluency, 105, 96, { align: 'center' });

            // Per-sentence table
            let y = 114;
            doc.setFontSize(12);
            doc.setTextColor(31, 41, 55);
            doc.text('Per-Sentence Breakdown', 20, y);
            y += 8;

            // Table header
            doc.setFillColor(243, 244, 246);
            doc.rect(20, y, 170, 8, 'F');
            doc.setFontSize(8);
            doc.setTextColor(75, 85, 99);
            doc.text('#', 24, y + 6);
            doc.text('Sentence', 32, y + 6);
            doc.text('Acc(30%)', 125, y + 6);
            doc.text('Comp(30%)', 142, y + 6);
            doc.text('Pro(40%)', 160, y + 6);
            doc.text('Score', 178, y + 6);
            y += 10;

            sentenceEntries.forEach(([idx, sc]) => {
                if (y > 270) { doc.addPage(); y = 20; }
                const sentNum = Number(idx) + 1;
                const sentText = sc.sentence?.text || 'Sentence ' + sentNum;
                const sentTotal = calculateTotalScore(sc.accuracy || 0, sc.completeness || 0, sc.prosody || 0);

                doc.setFontSize(8);
                doc.setTextColor(31, 41, 55);
                doc.text(String(sentNum), 24, y + 4);
                doc.text(sentText.substring(0, 55) + (sentText.length > 55 ? '...' : ''), 32, y + 4);
                doc.text(String(sc.accuracy || 0), 125, y + 4);
                doc.text(String(sc.completeness || 0), 142, y + 4);
                doc.text(String(sc.prosody || 0), 160, y + 4);
                if (sentTotal >= 80) doc.setTextColor(22, 163, 74);
                else if (sentTotal >= 60) doc.setTextColor(37, 99, 235);
                else doc.setTextColor(234, 88, 12);
                doc.text(String(sentTotal), 178, y + 4);
                doc.setTextColor(31, 41, 55);
                doc.setDrawColor(229, 231, 235);
                doc.line(20, y + 7, 190, y + 7);
                y += 9;

                // Show weak words
                const weakWords = (sc.words || []).filter(w => w.accuracyScore < 60 || w.errorType !== 'None');
                if (weakWords.length > 0) {
                    doc.setFontSize(7);
                    doc.setTextColor(220, 38, 38);
                    const weakStr = 'Needs work: ' + weakWords.map(w => w.word + '(' + w.accuracyScore + ')').join(', ');
                    doc.text(weakStr.substring(0, 80), 32, y + 3);
                    y += 7;
                }
            });

            // Footer
            y += 10;
            if (y > 270) { doc.addPage(); y = 20; }
            doc.setFontSize(8);
            doc.setTextColor(156, 163, 175);
            doc.text("Stephanie's English Lab - AI Pronunciation Assessment powered by Azure Speech Service", 105, y, { align: 'center' });

            doc.save('Shadowing_Week' + weekId + '_' + studentName + '.pdf');
            } catch (err) {
                console.error('PDF generation error:', err);
                alert('PDF 產生失敗：' + err.message);
            }
        }

                        const avgFluency = avg('fluency');
                        const avgProsody = avg('prosody');
                        const avgCompleteness = avg('completeness');
                        const avgPronunciation = avg('pronunciation');

                        // Find weak words across all sentences

                        const allOmissions = [];

                                    allMispronunciations.push({ word: w.word, score: w.accuracyScore, sentence: sentenceText });

                                            {totalScore !== null ? (
                                                <span className={`text-2xl font-bold ${totalScore >= 80 ? 'text-green-600' : totalScore >= 60 ? 'text-blue-600' : 'text-orange-600'}`}>{totalScore}</span>
                                            ) : (
                                                <span className="text-lg text-gray-400">—</span>
                                            )}
                                            <span className="text-gray-400">{expandedWeek === week.id ? '▲' : '▼'}</span>
                                        </div>
                                    </div>
                                </button>

                                {expandedWeek === week.id && (
                                    <div className="border-t border-gray-200 p-4 space-y-4">

        function TeacherStatusTab({ selectedClass, setSelectedClass, unlockedWeeks = [], setUnlockedWeeks }) {
            const students = CLASSES[selectedClass];
            const [allScores, setAllScores] = useState({});
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                setLoading(true);
                loadAllScores(selectedClass).then(data => {
                    setAllScores(data);
                    setLoading(false);
                });
            }, [selectedClass]);

            // Build a lookup: studentName → { weekId: { sentences } }
            const scoresByName = useMemo(() => {
                const map = {};
                Object.values(allScores).forEach(entry => {
                    const name = entry.studentName;
                    if (!map[name]) map[name] = {};
                    Object.entries(entry.weeks || {}).forEach(([wId, wData]) => {
                        map[name][wId] = wData;
                    });
                });
                return map;
            }, [allScores]);

            const getStatus = (studentName, weekId) => {
                if (!unlockedWeeks.includes(weekId)) return { status: 'locked', lateDay: 0 };
                const studentWeeks = scoresByName[studentName];
                if (!studentWeeks || !studentWeeks[weekId]) return { status: 'notSubmitted', lateDay: 0 };
                const hasScores = Object.keys(studentWeeks[weekId]).length > 0;
                return hasScores ? { status: 'submitted', lateDay: 0 } : { status: 'notSubmitted', lateDay: 0 };
            };

            const toggleWeekLock = async (weekId) => {
                let newUnlocked;
                if (unlockedWeeks.includes(weekId)) {
                    newUnlocked = unlockedWeeks.filter(id => id !== weekId);
                } else {
                    newUnlocked = [...unlockedWeeks, weekId].sort((a, b) => a - b);
                }
                setUnlockedWeeks(newUnlocked);
                await saveWeekSettings(newUnlocked);
            };

            const handleExcel = () => {
                const ws_data = [
                    ['班級', selectedClass],
                    [],
                    ['學生']
                ];

                WEEKS.forEach(w => ws_data[2].push(`W${w.id}`));

                students.forEach(student => {
                    const row = [`${String(student.id).padStart(2, '0')} ${student.name}`];
                    WEEKS.forEach(week => {
                        const status = getStatus(student.name, week.id);
                        if (status.status === 'locked') row.push('🔒');
                        else if (status.status === 'submitted') row.push('✅');
                        else if (status.status === 'late') row.push(`⏱ ${status.lateDay}d`);
                        else row.push('—');
                    });
                    ws_data.push(row);
                });

                const wb = window.XLSX.utils.book_new();
                const ws = window.XLSX.utils.aoa_to_sheet(ws_data);
                window.XLSX.utils.book_append_sheet(wb, ws, '狀態板');
                window.XLSX.writeFile(wb, `班級狀態_${selectedClass}.xlsx`);
            };

            return (
                <div className="space-y-4">
                    <div className="flex gap-4 items-center">
                        <select
                            value={selectedClass}
                            onChange={(e) => setSelectedClass(e.target.value)}
                            className="border border-gray-300 rounded-lg px-4 py-2 font-medium"
                        >
                            {Object.keys(CLASSES).map(cls => (
                                <option key={cls} value={cls}>{cls}</option>
                            ))}
                        </select>
                        <button
                            onClick={handleExcel}
                            className="px-4 py-2 bg-emerald-600 text-white rounded-lg font-semibold hover:bg-emerald-700"
                        >
                            匯出 Excel
                        </button>
                    </div>

                    <div className="bg-white rounded-lg p-6 shadow-sm border border-gray-100">
                        <div className="flex items-center gap-2 mb-4 flex-wrap">
                            <span className="text-sm font-semibold text-gray-700 mr-2">週次開放設定：</span>
                            {WEEKS.map(w => {
                                const isOpen = unlockedWeeks.includes(w.id);
                                return (
                                    <button
                                        key={w.id}
                                        onClick={() => toggleWeekLock(w.id)}
                                        className={`px-3 py-1 rounded-full text-xs font-semibold transition ${
                                            isOpen
                                                ? 'bg-emerald-100 text-emerald-700 border border-emerald-300'
                                                : 'bg-gray-100 text-gray-400 border border-gray-200'
                                        }`}
                                        title={isOpen ? '點擊鎖定' : '點擊開放'}
                                    >
                                        {isOpen ? '🔓' : '🔒'} W{w.id}
                                    </button>
                                );
                            })}
                        </div>
                        <div className="overflow-x-auto">
                        <table className="w-full text-sm">
                            <thead>
                                <tr className="border-b border-gray-200">
                                    <th className="text-left py-3 px-4 font-semibold text-gray-900">學生</th>
                                    {WEEKS.map(w => (
                                        <th key={w.id} className="text-center py-3 px-2 font-semibold text-gray-900 whitespace-nowrap">W{w.id}</th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody>
                                {students.map(student => (
                                    <tr key={student.id} className="border-b border-gray-100 hover:bg-gray-50">
                                        <td className="py-3 px-4 text-gray-900 font-medium">{String(student.id).padStart(2, '0')} {student.name}</td>
                                        {WEEKS.map(week => {
                                            const status = getStatus(student.name, week.id);
                                            let icon = '⚪';
                                            if (status.status === 'submitted') icon = '🟢';
                                            else if (status.status === 'late') icon = '🟡';
                                            else if (status.status === 'notSubmitted') icon = '⚪';
                                            else if (status.status === 'locked') icon = '🔒';

                                            return (
                                                <td key={week.id} className="text-center py-3 px-2 text-lg">
                                                    <div className="flex items-center justify-center gap-1">
                                                        <span>{icon}</span>
                                                        {status.status === 'late' && <span className="text-xs text-gray-600">{status.lateDay}d</span>}
                                                    </div>
                                                </td>
                                            );
                                        })}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        </div>
                    </div>
                </div>
            );
        }

        function TeacherScoresTab({ selectedClass, setSelectedClass, unlockedWeeks = [] }) {
            const [allScores, setAllScores] = useState({});
            const [loading, setLoading] = useState(true);
            const [selectedStudentId, setSelectedStudentId] = useState(null);

            // Load all scores from Firestore
            useEffect(() => {
                setLoading(true);
                loadAllScores(selectedClass).then(data => {
                    setAllScores(data);
                    setLoading(false);
                });
            }, [selectedClass]);

            const handleRefresh = () => {
                setLoading(true);
                loadAllScores(selectedClass).then(data => {
                    setAllScores(data);
                    setLoading(false);
                });
            };

            // Build student list with scores
            const studentList = Object.entries(allScores).map(([uid, data]) => {
                const weekTotals = {};
                Object.entries(data.weeks).forEach(([weekId, sentences]) => {
                    const entries = Object.values(sentences);
                    if (entries.length > 0) {
                        const avg = (key) => Math.round(entries.reduce((s, e) => s + (e[key] || 0), 0) / entries.length);
                        weekTotals[weekId] = {
                            total: calculateTotalScore(avg('accuracy'), avg('completeness'), avg('prosody')),
                            accuracy: avg('accuracy'),
                            fluency: avg('fluency'),
                            prosody: avg('prosody'),
                            completeness: avg('completeness'),
                            sentenceCount: entries.length
                        };
                    }
                });
                return { uid, name: data.studentName, className: data.className, weekTotals, weeks: data.weeks };
            });

            const handleExcel = () => {
                const ws_data = [['班級', selectedClass], [], ['學生', '週次', '準確度', '流暢度', '語調', '完整度', '總分', '完成句數']];
                studentList.forEach(student => {
                    Object.entries(student.weekTotals).forEach(([weekId, wt]) => {
                        ws_data.push([
                            student.name, `W${weekId}`,
                            wt.accuracy, wt.fluency, wt.prosody, wt.completeness, wt.total, wt.sentenceCount
                        ]);
                    });
                });
                const wb = window.XLSX.utils.book_new();
                const ws = window.XLSX.utils.aoa_to_sheet(ws_data);
                window.XLSX.utils.book_append_sheet(wb, ws, 'AI評分');
                window.XLSX.writeFile(wb, `AI評分_${selectedClass}.xlsx`);
            };

            // Detail view for a selected student
            if (selectedStudentId) {
                const student = studentList.find(s => s.uid === selectedStudentId);
                if (!student) return <p>找不到學生資料</p>;

                return (
                    <div className="space-y-4">
                        <button onClick={() => setSelectedStudentId(null)} className="text-emerald-600 font-semibold hover:text-emerald-700">← 返回成績表</button>
                        <h3 className="text-xl font-bold text-gray-900">{student.name} 的詳細成績</h3>
                        {Object.entries(student.weeks).sort(([a],[b]) => Number(a) - Number(b)).map(([weekId, sentences]) => {
                            const wt = student.weekTotals[weekId];
                            if (!wt) return null;
                            return (
                                <div key={weekId} className="bg-white rounded-lg p-6 shadow-sm border border-gray-100">
                                    <div className="flex justify-between items-center mb-4">
                                        <h4 className="font-semibold text-gray-900">Week {weekId}: {WEEKS[Number(weekId) - 1]?.title || ''}</h4>
                                        <span className={`text-2xl font-bold ${wt.total >= 80 ? 'text-green-600' : wt.total >= 60 ? 'text-blue-600' : 'text-orange-600'}`}>{wt.total}</span>
                                    </div>
                                    <div className="grid grid-cols-4 gap-3 mb-4">
                                        {[
                                            { label: '準確度', value: wt.accuracy, color: 'text-blue-600' },
                                            { label: '流暢度', value: wt.fluency, color: 'text-purple-600' },
                                            { label: '語調', value: wt.prosody, color: 'text-pink-600' },
                                            { label: '完整度', value: wt.completeness, color: 'text-green-600' },
                                        ].map(item => (
                                            <div key={item.label} className="bg-gray-50 rounded-lg p-3 text-center">
                                                <p className="text-xs text-gray-500">{item.label}</p>
                                                <p className={`text-xl font-bold ${item.color}`}>{item.value}</p>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="space-y-1 text-sm">
                                        {Object.entries(sentences).sort(([a],[b]) => Number(a) - Number(b)).map(([idx, sc]) => {
                                            const weakW = (sc.words || []).filter(w => w.accuracyScore < 60 || w.errorType !== 'None');
                                            return (
                                                <div key={idx} className="flex items-center justify-between py-1 border-b border-gray-50">
                                                    <span className="text-gray-600">#{Number(idx) + 1}</span>
                                                    <div className="flex gap-2 text-xs">
                                                        <span className="text-blue-600">音{sc.accuracy}</span>
                                                        <span className="text-green-600">完{sc.completeness}</span>
                                                        <span className="text-pink-600">調{sc.prosody}</span>
                                                    </div>
                                                    {weakW.length > 0 && <span className="text-xs text-red-500">{weakW.map(w => w.word).join(', ')}</span>}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                );
            }

            return (
                <div className="space-y-4">
                    <div className="flex gap-4 items-center">
                        <select value={selectedClass} onChange={(e) => setSelectedClass(e.target.value)} className="border border-gray-300 rounded-lg px-4 py-2 font-medium">
                            {Object.keys(CLASSES).map(cls => <option key={cls} value={cls}>{cls}</option>)}
                        </select>
                        <button onClick={handleRefresh} className="px-4 py-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700">
                            🔄 重新整理
                        </button>
                        <button onClick={handleExcel} disabled={studentList.length === 0} className="px-4 py-2 bg-emerald-600 text-white rounded-lg font-semibold hover:bg-emerald-700 disabled:opacity-50">
                            匯出 Excel
                        </button>
                    </div>

                    {loading ? (
                        <div className="bg-white rounded-lg p-12 shadow-sm border border-gray-100 text-center">
                            <p className="text-gray-500 animate-pulse">🔄 從雲端載入成績中...</p>
                        </div>
                    ) : studentList.length === 0 ? (
                        <div className="bg-white rounded-lg p-12 shadow-sm border border-gray-100 text-center">
                            <p className="text-gray-500">目前還沒有學生提交成績</p>
                        </div>
                    ) : (
                        <div className="bg-white rounded-lg p-6 shadow-sm border border-gray-100 overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead>
                                    <tr className="border-b border-gray-200">
                                        <th className="text-left py-3 px-4 font-semibold text-gray-900">學生</th>
                                        {WEEKS.filter(w => unlockedWeeks.includes(w.id)).map(w => (
                                            <th key={w.id} className="text-center py-3 px-2 font-semibold text-gray-900 whitespace-nowrap">W{w.id}</th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody>
                                    {studentList.map(student => (
                                        <tr key={student.uid} className="border-b border-gray-100 hover:bg-gray-50">
                                            <td onClick={() => setSelectedStudentId(student.uid)} className="py-3 px-4 text-gray-900 font-medium cursor-pointer hover:text-emerald-600">
                                                {student.name}
                                            </td>
                                            {WEEKS.filter(w => unlockedWeeks.includes(w.id)).map(week => {
                                                const wt = student.weekTotals[week.id];
                                                return (
                                                    <td key={week.id} className="text-center py-3 px-2">
                                                        {wt ? (
                                                            <div>
                                                                <span className={`font-bold ${wt.total >= 80 ? 'text-green-600' : wt.total >= 60 ? 'text-blue-600' : 'text-orange-600'}`}>{wt.total}</span>
                                                                <p className="text-xs text-gray-400">{wt.sentenceCount}句</p>
                                                            </div>
                                                        ) : (
                                                            <span className="text-gray-300">—</span>
                                                        )}
                                                    </td>
                                                );
                                            })}
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}
                </div>
            );
        }

        function TeacherAnalyticsTab({ selectedClass }) {
            const [allScores, setAllScores] = useState({});
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                setLoading(true);
                loadAllScores(selectedClass).then(data => {
                    setAllScores(data);
                    setLoading(false);
                });
            }, [selectedClass]);

            // Calculate class average per week from real Firestore data
            const avgByWeek = useMemo(() => {
                const result = {};
                WEEKS.forEach(week => {
                    let sum = 0;
                    let count = 0;
                    Object.values(allScores).forEach(studentEntry => {
                        const weekData = (studentEntry.weeks || {})[week.id] || (studentEntry.weeks || {})[String(week.id)];
                        if (weekData && Object.keys(weekData).length > 0) {
                            const scores = Object.values(weekData);
                            const avgAcc = scores.reduce((s, sc) => s + (sc.accuracy || 0), 0) / scores.length;
                            const avgComp = scores.reduce((s, sc) => s + (sc.completeness || 0), 0) / scores.length;
                            const avgPros = scores.reduce((s, sc) => s + (sc.prosody || 0), 0) / scores.length;
                            const total = calculateTotalScore(avgAcc, avgComp, avgPros);
                            sum += total;
                            count++;
                        }
                    });
                    result[week.id] = count > 0 ? Math.round(sum / count) : 0;
                });
                return result;
            }, [allScores]);

            if (loading) {
                return <div className="text-center py-12 text-gray-500">載入中...</div>;
            }

            return (
                <div className="space-y-6">
                    <div className="bg-white rounded-lg p-6 shadow-sm border border-gray-100">
                        <h3 className="font-bold text-gray-900 mb-4">班級平均分數</h3>
                        {Object.values(avgByWeek).every(v => v === 0) ? (
                            <p className="text-gray-500 text-center py-8">目前還沒有學生成績資料</p>
                        ) : (
                            <div className="teacher bar-chart">
                                {WEEKS.map((week) => {
                                    const avg = avgByWeek[week.id];
                                    return (
                                        <div key={week.id} className="flex-1 flex flex-col items-center">
                                            <div style={{
                                                width: '100%',
                                                height: avg > 0 ? `${avg}px` : '2px',
                                                display: avg > 0 ? 'block' : 'none'
                                            }} className="bar-segment"></div>
                                            {avg === 0 && <div className="w-full h-1 bg-gray-300 rounded"></div>}
                                            <div className="bar-label font-medium text-gray-700">W{week.id}</div>
                                            {avg > 0 && <div className="bar-label text-xs text-gray-500">{avg}</div>}
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function TeacherPortal({ onLogout, unlockedWeeks, setUnlockedWeeks }) {
            const [activeTab, setActiveTab] = useState('status');
            const [selectedClass, setSelectedClass] = useState('電機一忠');

            return (
                <div className="min-h-screen bg-gray-50 teacher">
                    <header className="bg-white shadow-sm border-b border-gray-200">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <span className="text-3xl">🎧</span>
                                <div>
                                    <h1 className="text-xl font-bold text-gray-900">Shadowing English</h1>
                                    <p className="text-sm text-gray-600">教師中心</p>
                                </div>
                            </div>
                            <div className="text-right">
                                <p className="font-semibold text-gray-900">教師</p>
                            </div>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto px-4 py-8">
                        <div className="flex gap-4 mb-8 overflow-x-auto pb-2">
                            {[
                                { id: 'status', label: '週次狀態板' },
                                { id: 'scores', label: '成績管理' },
                                { id: 'analytics', label: '班級分析' }
                            ].map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`px-6 py-2 rounded-lg font-semibold transition whitespace-nowrap ${
                                        activeTab === tab.id
                                            ? 'bg-emerald-600 text-white'
                                            : 'bg-white text-gray-700 border border-gray-200 hover:border-emerald-300'
                                    }`}
                                >
                                    {tab.label}
                                </button>
                            ))}
                        </div>

                        <div>
                            {activeTab === 'status' && <TeacherStatusTab selectedClass={selectedClass} setSelectedClass={setSelectedClass} unlockedWeeks={unlockedWeeks} setUnlockedWeeks={setUnlockedWeeks} />}
                            {activeTab === 'scores' && <TeacherScoresTab selectedClass={selectedClass} setSelectedClass={setSelectedClass} unlockedWeeks={unlockedWeeks} />}
                            {activeTab === 'analytics' && <TeacherAnalyticsTab selectedClass={selectedClass} />}
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-4 py-4">
                        <button
                            onClick={onLogout}
                            className="text-gray-600 hover:text-gray-900 font-medium"
                        >
                            登出
                        </button>
                    </div>
                </div>
            );
        }

        // ==================== MAIN APP ====================
        function App() {
            const [user, setUser] = useState(null);
            const [unlockedWeeks, setUnlockedWeeks] = useState([1, 2, 3]); // default: first 3 weeks open

            // Load week settings from Firestore on mount
            useEffect(() => {
                loadWeekSettings().then(settings => {
                    if (settings && settings.unlockedWeeks) {
                        setUnlockedWeeks(settings.unlockedWeeks);
                    }
                });
            }, []);

            // Helper: check if a week is locked
            const isWeekLocked = (weekId) => !unlockedWeeks.includes(weekId);

            const handleLogin = (loginData) => {
                setUser(loginData);
            };

            const handleLogout = () => {
                auth.signOut().catch(() => {});
                setUser(null);
            };

            if (!user) {
                return <LoginScreen onLogin={handleLogin} />;
            }

            if (user.role === 'student') {
                return <StudentPortal user={user} onLogout={handleLogout} isWeekLocked={isWeekLocked} />;
            }

            return <TeacherPortal onLogout={handleLogout} unlockedWeeks={unlockedWeeks} setUnlockedWeeks={setUnlockedWeeks} />;
        }

        // ==================== RENDER ====================
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
