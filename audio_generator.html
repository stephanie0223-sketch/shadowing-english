<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>ElevenLabs 音檔生成器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; background: #f8f9fa; }
h1 { color: #2563eb; }
.btn { background: #2563eb; color: white; border: none; padding: 14px 32px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
.btn:hover { background: #1d4ed8; }
.btn:disabled { background: #9ca3af; cursor: not-allowed; }
#progress { margin: 20px 0; }
.bar-bg { background: #e5e7eb; border-radius: 8px; height: 24px; overflow: hidden; }
.bar-fill { background: linear-gradient(90deg, #2563eb, #3b82f6); height: 100%; border-radius: 8px; transition: width 0.3s; }
#log { background: white; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; max-height: 400px; overflow-y: auto; font-size: 13px; font-family: monospace; line-height: 1.8; white-space: pre-wrap; }
.success { color: #16a34a; }
.error { color: #dc2626; }
.info { color: #2563eb; }
.warn { color: #ea580c; }
</style>
</head>
<body>
<h1>🎙️ ElevenLabs 音檔生成器</h1>
<p>按下按鈕，自動生成全部 72 個跟讀音檔，完成後下載 ZIP 壓縮檔。</p>

<button class="btn" id="startBtn" onclick="startGeneration()">開始生成 72 個音檔</button>
<button class="btn" id="dlBtn" style="display:none; background:#16a34a;" onclick="downloadZip()">📦 下載 ZIP 檔案</button>

<div id="progress" style="display:none;">
  <p id="statusText" style="font-weight:600; color:#1f2937;"></p>
  <div class="bar-bg"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
  <p id="countText" style="font-size:13px; color:#6b7280;"></p>
</div>

<div id="log"></div>

<script>
const API_KEY = "sk_558bbc35f1541d293966060323f25427ddb5086498d69e57";
const VOICE_ID = "l4Coq6695JDX9xtLqXDE";
const TTS_URL = `https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`;

const SENTENCES = {
  1: { title: "Daily Routines", sentences: [
    "I just pulled an all-nighter. Kind of feel like a zombie now.",
    "Well, I mean, my secret is simple. I'm a classic morning person.",
    "Yeah, pretty much. I really just stick to a routine.",
    "A routine? I bet you hit the gym early, too.",
    "Yeah. I really do. I work out right away.",
    "Oh, that makes sense, I guess. Well, I'm a total night owl.",
    "Make sure you grab a bite. You've got this.",
    "That's the spirit. I'm super proud of you."
  ]},
  2: { title: "Dating", sentences: [
    "I mean, you totally have butterflies just seeing them.",
    "And it takes a lot of guts to ask someone out.",
    "You just want to break the ice fast, you know?",
    "Right. You really hope you two just hit it off.",
    "Like, was that weird joke a huge red flag?",
    "It's so rude when they ghost someone.",
    "It's way better to just agree to take it slow.",
    "Exactly. You got to set good limits for yourself."
  ]},
  3: { title: "Friendship", sentences: [
    "True. But you just click with someone, right?",
    "Oh, wow. No way. How did you get along with them?",
    "But we grab a drink and hang out.",
    "A lot of shared habits help when we catch up.",
    "But honestly, it is easy to grow apart.",
    "Exactly. You must stay close through thick and thin.",
    "You just got to be there for someone.",
    "Good friends always have someone's back."
  ]},
  4: { title: "Playing Basketball", sentences: [
    "I hit the local court today. I really wanted to shoot hoops for a bit.",
    "But anyone can join a pickup game here, right?",
    "A sudden fast break feels kind of scary.",
    "Like, you always got to warm up, you know?",
    "Honestly, nobody is on fire right away.",
    "New players should just pass the ball.",
    "I really got to step up my game next time.",
    "Just get back out there and give it a shot."
  ]},
  5: { title: "Cooking", sentences: [
    "Like I used to grab a snack every single day.",
    "I just decided to try some weekend meal prep.",
    "Making food from scratch gets a lot easier over time.",
    "I always try to follow a recipe, but the food just gets burned to a crisp.",
    "Just make a faster stir fry.",
    "You just whip up some hot comfort food in minutes.",
    "Plus, you save cash when you don't eat out.",
    "So, cooking at home keeps money in your pocket."
  ]},
  6: { title: "Outdoor Activities", sentences: [
    "You and I got to get some fresh air.",
    "We really need a total change of pace.",
    "We simply just pack up and hit the trail.",
    "But you got to step out of your comfort zone.",
    "I think I want to tag along.",
    "Well, first we both really got to gear up.",
    "Honestly, I can't even set up camp.",
    "I really can't wait to take in the view."
  ]},
  7: { title: "Airport English", sentences: [
    "First you got to check in, then grab a paper boarding pass.",
    "Just bring carry-on luggage instead.",
    "Then you go through security fast.",
    "I always pick an aisle seat. I walk around a lot.",
    "You got to walk before you buckle up.",
    "Drinking water also fights jet lag.",
    "I got to pick someone up later.",
    "My brother gets me when we touch down."
  ]},
  8: { title: "Homestay English", sentences: [
    "First off, you'll probably feel homesick.",
    "You just need time to get used to things.",
    "It's mostly about learning all the house rules.",
    "You just want to relax and settle in, you know?",
    "You really need to pitch in. Like just offer to help out.",
    "Like you can offer to do the dishes or just tidy up the kitchen a bit.",
    "The trick is to make oneself at home. You build trust that way.",
    "Reverse culture shock. That's a wild thought."
  ]},
  9: { title: "Screen Time", sentences: [
    "Those tools go viral so fast, you know?",
    "Why are we so hooked on them?",
    "We just scroll through endless feeds all day.",
    "We just want to keep up with the trends.",
    "You never want to miss out on cool stuff.",
    "We got to weigh the pros and cons, right?",
    "Honestly, it is kind of hard to find a balance.",
    "You know, you got to track your screen time daily."
  ]}
};

let zipData = {};
let totalDone = 0;
let totalFailed = 0;
const TOTAL = 72;

function log(msg, cls) {
  const el = document.getElementById('log');
  el.innerHTML += `<span class="${cls || ''}">${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}

function updateProgress() {
  const pct = Math.round(((totalDone + totalFailed) / TOTAL) * 100);
  document.getElementById('barFill').style.width = pct + '%';
  document.getElementById('countText').textContent = `完成 ${totalDone} / ${TOTAL}　失敗 ${totalFailed}`;
}

async function generateOne(weekNum, sentIdx, text) {
  const filename = `W${weekNum}_S${sentIdx}.mp3`;
  const folder = `W${weekNum}`;

  try {
    const resp = await fetch(TTS_URL, {
      method: 'POST',
      headers: {
        'Accept': 'audio/mpeg',
        'Content-Type': 'application/json',
        'xi-api-key': API_KEY
      },
      body: JSON.stringify({
        text: text,
        model_id: 'eleven_turbo_v2',
        voice_settings: { stability: 0.5, similarity_boost: 0.75, style: 0.3, use_speaker_boost: true }
      })
    });

    if (!resp.ok) {
      const errText = await resp.text();
      log(`❌ ${filename} 失敗 (${resp.status}): ${errText.substring(0, 100)}`, 'error');
      totalFailed++;
      updateProgress();
      return;
    }

    const blob = await resp.blob();
    if (blob.size < 1000) {
      log(`❌ ${filename} 檔案太小 (${blob.size} bytes)，跳過`, 'error');
      totalFailed++;
      updateProgress();
      return;
    }

    if (!zipData[folder]) zipData[folder] = {};
    zipData[folder][filename] = blob;
    const kb = (blob.size / 1024).toFixed(1);
    log(`✅ ${filename} 完成 (${kb} KB)`, 'success');
    totalDone++;
    updateProgress();
  } catch (e) {
    log(`❌ ${filename} 網路錯誤: ${e.message}`, 'error');
    totalFailed++;
    updateProgress();
  }
}

async function startGeneration() {
  document.getElementById('startBtn').disabled = true;
  document.getElementById('progress').style.display = 'block';
  document.getElementById('log').innerHTML = '';
  zipData = {};
  totalDone = 0;
  totalFailed = 0;

  for (const [weekNum, weekData] of Object.entries(SENTENCES)) {
    document.getElementById('statusText').textContent = `🔊 正在生成 Week ${weekNum}: ${weekData.title}...`;
    log(`\n📂 Week ${weekNum} — ${weekData.title}`, 'info');

    for (let i = 0; i < weekData.sentences.length; i++) {
      await generateOne(Number(weekNum), i + 1, weekData.sentences[i]);
      // Rate limit: wait 1.5s between requests
      if (i < weekData.sentences.length - 1 || Number(weekNum) < 9) {
        await new Promise(r => setTimeout(r, 1500));
      }
    }
  }

  document.getElementById('statusText').textContent = totalFailed === 0
    ? `🎉 全部完成！成功 ${totalDone} 個`
    : `⚠️ 完成！成功 ${totalDone} 個，失敗 ${totalFailed} 個`;

  if (totalDone > 0) {
    document.getElementById('dlBtn').style.display = 'inline-block';
    log(`\n📦 點「下載 ZIP 檔案」按鈕即可下載！`, 'info');
  }

  if (totalFailed > 0) {
    log(`\n⚠️ 有 ${totalFailed} 個失敗，可重新整理頁面再試一次`, 'warn');
  }
}

async function downloadZip() {
  document.getElementById('dlBtn').textContent = '⏳ 打包中...';
  const zip = new JSZip();
  for (const [folder, files] of Object.entries(zipData)) {
    const f = zip.folder(folder);
    for (const [name, blob] of Object.entries(files)) {
      f.file(name, blob);
    }
  }
  const content = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(content);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'shadowing_audio.zip';
  a.click();
  URL.revokeObjectURL(url);
  document.getElementById('dlBtn').textContent = '📦 下載 ZIP 檔案';
  log('✅ ZIP 下載完成！解壓縮後把 W1~W9 資料夾上傳到 GitHub', 'success');
}
</script>
</body>
</html>
